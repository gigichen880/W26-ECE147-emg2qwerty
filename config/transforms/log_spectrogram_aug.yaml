# @package _global_
to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

band_rotation:
  _target_: emg2qwerty.transforms.ForEach  # i.i.d rotation offset for each band
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120  # Max 60ms jitter for 2kHz EMG

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16  # Downsamples from 2kHz to 125Hz

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25  # Max 200ms per time mask for 125Hz spectrogram
  n_freq_masks: 2
  freq_mask_param: 4

raw_noise:
  _target_: emg2qwerty.transforms.AdditiveGaussianNoise
  sigma: 0.01
  p: 0.3
  relative: true

raw_timemask:
  _target_: emg2qwerty.transforms.TimeMaskRaw
  max_width: 100   # 100ms @ 2kHz
  n_masks: 1
  p: 0.3
  mask_value: 0.0

logspec_norm:
  _target_: emg2qwerty.transforms.ZScoreNormalize
  eps: 1.0e-6

transforms:
  train:
    - ${to_tensor}
    - ${raw_noise}        # new: raw-domain noise
    - ${raw_timemask}     # new: raw-domain time masking
    - ${band_rotation}
    - ${temporal_jitter}
    - ${logspec}
    - ${specaug}
    - ${logspec_norm}     # new: normalize features fed to model

  val:
    - ${to_tensor}
    - ${logspec}
    - ${logspec_norm}     # new: normalize features

  test: ${transforms.val}
